<article class="content">
<strong>哈罗扰乱（Harrow 
Vexed）</strong>：每当魔法使用者释放法术，就抽出一张牌。若牌是完全或部分与施法者阵营一致，释放的法术-2CL（完全一致并没有额外好处）。若牌和施法者阵营完全相反，则法术+1CL。其它情况下，本法术荒疫没有效果。复原术（restoration）或次级复原术（lesser 
restoration）可以治愈这个效果。
</article>
