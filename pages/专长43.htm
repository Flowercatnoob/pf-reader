<strong>天堂升华Talmandor's Lifting 伟业<br></strong><em>当你在碰上会致死的坠落事件时，你感觉到强力的天堂之翼保护着你。而且这股力量仍以某种方式连结到你的灵魂。</em><br><strong>条件</strong>：至少在三个不同的地方受到10d6的坠落伤害并且活下来。<br><strong>效果</strong>：当你将治疗法术施放在没有受伤的生物身上时，他身上会短暂的出现一对发光的翅膀。而法术将会保存在对方身上每等级一小时直到触发。当生物受到了可以被该法术治疗、移除或是减轻的效果后，生物可以用一个迅捷动作触发该法术，这会让那对光翼短暂的显现。
</article>
