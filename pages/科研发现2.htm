<strong>定向炸弹(Directed Bomb)</strong> 出自《魔法市集指南》(Magical Marketplace pg. 20)<br><strong>类型</strong>：科研发现（Alchemist Discoveries）<br><strong>效果</strong>：取代五尺爆发，炼金术师可以使他的炸弹在15尺锥形内溅射。炼金术师选择锥形的方向。如果攻击未命中，再投掷额外的1d8来确定炸弹所在地的溅射方向。这项科研发现不能和高爆炸弹结合使用。
