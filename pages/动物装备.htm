<strong>磨牙骨</strong>Whet bone<br>出自《动物档案 pg. 12》<br>价格：1 
sp<br>重量：2磅<br>类型：动物装备<br>描述：这动物骨髓与矿物质的硬化混合物被制成一根长骨头。当磨牙骨被一个生物咀嚼不少于15分钟后，它能给予该生物下次啃咬攻击的伤害+1加值。这只能作用与非魔法的啃咬攻击。
