<p>投毒者小圆盾（Poisoner’s 
Buckler）<br>价格：1505 gp<br>重量：3 
磅<br>半卓尔（Half-drow）制造这种小圆盾，以便能在战斗中快速精准地涂抹毒药。这面<strong>秘银</strong>小圆盾被涂漆成黑色，表面有三条深深的凹槽，每个凹槽都配有一个能放置毒药小瓶的插槽。以一个移动动作，使用者可以将武器在小圆盾表面擦拭一下，使其沾染单剂量的毒药。该小圆盾可容纳3剂毒药。如果使用者不具备“用毒”职业能力，那么她就要如常遭遇使自己中毒的风险。<br><em>注：秘银盾+1000gp（按最新版本），小圆盾5gp</em></p>
