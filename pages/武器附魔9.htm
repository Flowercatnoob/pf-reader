<p><strong>骤降Plummeting</strong><br><strong>来源：</strong>Ultimate 
Wilderness pg. 247<br><strong>灵光：</strong>中等变化系；CL 
7<br><strong>价格：</strong>+1加值；<strong>重量：</strong>—</p>
<p>这种特殊能力只能附加在远程武器上。被骤降武器击中的飞行生物必须立即进行一个DC 
20的飞行检定，检定受到等于武器增强加值两倍的减值；如果失败，它会下降10尺的高度。在确认重击时，即使生物通过了飞行检定，它也会下降10尺的高度；如果检定失败，它会下降1d4×10尺的高度。如果飞行生物的高度下降导致它撞击地面或其他固体表面，它会受到相应的坠落伤害，并且不再飞行。</p>


<p><strong>制造要求：</strong><br>制造魔法武器和盔甲，降咒，飞行术；<strong>价格：</strong>—</p>
