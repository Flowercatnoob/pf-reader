<strong>回心转意（Change of 
Heart）<br></strong><em>在胜利的时刻，你能帮助对手理解你的视角。</em><br><strong>前提：</strong>基本攻击加值+6或武僧等级6。<br><strong>效果：</strong>当你的近战攻击会使对手的生命值降至0或更低，或使对手失去知觉时，你可以选择放弃这次伤害，而是尝试交涉检定来影响目标的态度。<br>该检定的DC等于20+该生物的HD+该生物的魅力调整值。你获得相当于你这次攻击将造成的伤害的一半的加值，并且可以使用你的基本攻击加值替代你的交涉技能等级。与普通的交涉检定不同，你可以一次将目标对你的态度提高两阶以上。你只能对那些向你发动攻击，而非你首先攻击或挑起战斗的敌人使用该专长，
</article>
