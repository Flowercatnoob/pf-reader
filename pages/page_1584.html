<p><strong>速饮者</strong>(Accelerated Drinker) 出自《Cheliax, Empire of Devils》<br><strong>分类 
</strong>基础（战斗）<br><strong>效果 
</strong>你知道如何有效饮用一瓶药水，比如不使用你的手，把药瓶扔到空中然后用你的嘴接住，或者用你的牙齿打开瓶子。只要在你回合开始的时候你手中拿着药水，你就可以用一个移动动作而非标准动作饮用这瓶药水。</p>
