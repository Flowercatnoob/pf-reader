<p><strong>空洞面具</strong>Empty 
Mask出自《间谍大师手册》(Spymaster's Handbook pg. 7)<br>分类：缺陷<br>为了躲避政敌，你花费漫长时间隐藏自己的真实身份，以至于失去了过多的自我认知。在对抗对胁迫效果时，你的意志豁免-1；如果敌人知道你的真实身份，这个减值增加到-2。</p>
<p><strong>犯罪世家（Criminal 
Roots）</strong><br>出自《Spymaster's Handbook pg. 
6》<br>类型：社会<br>您的家族长期以来一直在经营非法活动。你在影响罪犯的交涉检定和影响守法公民的威吓检定获得+2背景加值，但在影响守法公民的交涉检定承受-2减值。交涉或威吓（由你选择）成为你的本职技能。</p>
