<p><strong>力之荒疫（Might 
blight）<br></strong><em>“老鼠帝国”地沟大树（Diguo-Dashu）的鼠族们开发了这种毒素来帮助他们的士兵战胜敌人。这种毒素会产生乳酸，使目标的肌肉慢慢退化，但要达到其完全的效果，则需要特别高的剂量、重复多次使用、或对特别虚弱的对手使用。</em><br><strong>价格</strong>：60 GP；<strong>重量</strong>：-磅。<br><strong>类型</strong>：伤口（injury）；<strong>豁免</strong>：强韧DC 13<br><strong>潜伏期</strong>：1轮；<strong>频率</strong>：1次/每轮，共4轮<br><strong>效果</strong>：1点力量伤害<br><strong>痊愈</strong>：2次连续豁免<br></p>
