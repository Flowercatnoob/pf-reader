<strong>晋升狗头人（Redeemed 
Kobold）</strong>PFS不可用<br>出自 <em>Kobolds of Golarion pg. 
25</em><br>在善良的龙族的教导之下你建立起的纯洁本性，让你的鳞片染上色彩并给予你更大的信心。<br>前置条件：善良阵营，狗头人<br>专长效果：你的鳞片呈现出与你拥有能量亲和相同或你要效仿的善良金属龙相同的金属光泽。在引起善良生物兴趣的交涉检定上你获得+2环境加值。另外，在判断引导正能量能力时，你的魅力视为比实际高2点。
