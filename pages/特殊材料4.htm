<img class=bbc_img alt="" src="https://www.aonprd.com/images/PathfinderSocietySymbol.gif" ><strong>太阳丝绸(Sunsilk)</strong><br><strong>出处</strong>：卡蒂亚，东方明珠Qadira, 
Jewel of the East 第33页<br>太阳丝绸，由一种原产于克莱什Kelesh中部的蚕种生产并被莎伦莱Sarenites教会严加看管，在被阳光照射过后会发出金光闪闪的光泽。虽然它很轻便灵活，但当被多层压在一起时，它那无数的细小纤维会阻碍武器，并能稍微阻挠挥砍或刺穿类型武器造成伤害。由太阳丝绸制成的衣服可使穿着者获得DR2/钝击。太阳丝绸可以融入任何种类的盔甲而不影响其质量，通常是作为一个软内衬。由太阳丝绸制成的服装或盔甲造价增加6,000 
gp的成本。<br>
