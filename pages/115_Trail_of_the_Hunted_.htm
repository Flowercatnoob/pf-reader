<strong>燃烧催化剂(Incendiary catalyst)</strong> 出自《寻路者#115:猎物小径》(Pathfinder #115: Trail of 
the Hunted pg. 74)<br><strong>价格：</strong>40gp <strong>重量：</strong>1lb<br><strong>类型：</strong>炼金武器 <strong>制造DC：</strong>工艺(炼金) 20<br><strong>效果：</strong>燃烧催化剂可以用作基础射程为10尺的远程接触武器来投掷攻击生物。命中时，目标被浇上助燃剂，使目标获得火焰易伤状态 
，持续1轮。燃烧催化剂不会影响已是火焰易伤的生物，且目标已有的免疫火焰伤害或火焰抗力如常计算。制作这个物品需要一个成功的 DC 
20工艺(炼金术)检验。
