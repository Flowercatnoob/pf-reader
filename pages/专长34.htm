<h1 class=title><img title="3.5 Material" src="https://aonprd.com/images/ThreeFiveSymbol.gif"><strong>剧毒咬撃（Noxious Bite）</strong><br><strong>出自《Dragons Revisited pg. 
9》</strong><br>　　你滴落强酸的吐息使得被你啃咬的生物不适。<br>
<hr>
　　<strong>前置需求：</strong>强酸吐息武器，啃咬攻击。<br>　　<strong>专长效果：</strong>你的啃咬攻击在其正常伤害之上造成额外1点强酸伤害。被你啃咬的活物必须通过强韧豁免（DC=你的吐息武器DC）否则反胃1+你的体质调整值的轮数（最少为1轮）。</h1>
