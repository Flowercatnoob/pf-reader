fiend)</strong><br><strong>出处</strong>：《内海舰船》（<em>Ships of the Inner Sea</em>）第二十九页<br><strong>价格</strong>：100gp 重量：-<br><strong>类型</strong>：炼金武器<br><strong>描述</strong>：点燃时，这个小小的圆锥形焰火发出明亮的白色火花，如同蜡烛般照亮区域。它可以如同泼溅武器般用以掷向某个方格交点。一轮后，它开始发出极亮的白色光线脉冲，持续1d6轮。任何在其15尺内开始回合的生物，必须通过一个DC12的反射检定，否则目盲1d4轮。<br><strong>制造DC</strong>：工艺(炼金)30
