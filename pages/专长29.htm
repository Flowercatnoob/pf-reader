<strong>狂暴增幅</strong>Amplified 
Rage<strong>（团队） 
</strong>出自《格拉里昂的兽人》p24<br><strong>需求：</strong>半兽人或兽人，狂暴职业能力<br>每当你进入狂暴时并与同样拥有此专长的狂暴盟友相邻的情况下，或与拥有此专长的狂暴盟友夹击同一对手时，你在力量和体质上的士气加值增加 
+4。该专长不与自身叠加（你只能从一个符合要求的盟友处获得此加值，无论有多少个盟友与你相邻）。
