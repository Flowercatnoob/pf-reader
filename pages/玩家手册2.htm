第11页<br><strong>分类</strong>：专长<br><strong>描述</strong>：你已经通过了艰苦的召唤测试，并从魔学院毕业。<br>先决条件:专精法师1级；不能对立咒法学派。<br><br>专长效果：每当你从咒法（召唤）学派释放一个耗时比标准动作更长的准备好的奥术法术，减少1轮施法时间（施法时间最短减少到到一个标准动作）。如此施法相当费力，需要通过一个强韧豁免（DC=15+法术环级）来避免疲乏。
