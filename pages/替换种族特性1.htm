<p>半身人种族替换能力 
出自《街道英雄Heros of the Streets》<br><br><strong>足下闪避者(Underfoot 
Dodger)</strong>：对住在城市的半身人而言，人群不视为困难地形，并在进行特技检定穿越比自己大的敌人的占据空间时获得+5加值。此能力替换无畏和武器熟悉。</p>
<p>矮人种族替换能力 
出自《市井英雄(Heroes of the Streets)》<br><br><strong>勤劳的城市人(Industrious 
Urbanite)</strong>：适应所居住城市需求的矮人能够在制造非魔法物品的工艺检定中有双倍的进展，并且能够在使用专业检定获取金钱的时候获得+4加值。该种族特性取代仇恨。</p>
