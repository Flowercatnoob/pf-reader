<article class="content">
<strong>溅射武器大师(Splash Weapon 
Mastery)</strong> 出自《冒险家军械库》(Adventurer's 
Armory)31页<br>你擅长于提高溅射武器的射程、范围和精确度。<br><strong>效果</strong>：当投掷溅射武器时，你可以如同拥有远距射击专长。当你使用溅射武器命中目标时，选择一个与溅射范围相邻的方格；此方格内的生物同样受到溅射伤害。当你投掷溅射武器失手时，你可以用+1或者-1来调整误落地点的方向。此专长在决定其他专长的先决条件时视为远距射击，但是仍旧只对溅射武器有效。
</article>
