<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pathfinder 规则全书</title>
<link rel="stylesheet" href="app.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PF规则书">
</head>
<body>

<header class="header">
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="菜单">☰</button>
  <h1>PF 规则书</h1>
  <div class="search-wrap">
    <input type="search" id="search-input" placeholder="搜索规则... (Ctrl+K)" autocomplete="off">
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="section-title">目录</div>
    <div id="toc-tree"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <main class="content-area" id="content">
    <div class="welcome">
      <h2>Pathfinder 规则全书</h2>
      <p>点击左侧目录浏览规则，或按 <b>Ctrl+K</b> 搜索。</p>
      <p style="margin-top:8px; font-size:12px; color:#666;">共收录 2122 页规则内容，支持离线查阅</p>
    </div>
  </main>
</div>

<div class="search-results" id="search-results">
  <div id="search-list"></div>
</div>

<script src="app.js"></script>
</body>
</html>
